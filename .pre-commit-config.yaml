repos:
  - repo: https://github.com/psf/black
    rev: 23.9.1
    hooks:
      - id: black
  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.14.6
    hooks:
      - id: ruff
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=512']
  - repo: local
    hooks:
      - id: prevent-db-commit
        name: Prevent committing DB/backup files
        entry: python scripts/prevent_db_commit.py
        language: system
        pass_filenames: false
      - id: prevent-tests-commit
        name: Prevent committing tests/ folder
        entry: python scripts/prevent_tests_commit.py
        language: system
        pass_filenames: false
      # disabled prevent-temp-runner-commit (removed by user request)
